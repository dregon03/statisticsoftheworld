name: Live Market Quotes

# Three triggers cover the full trading day (pre-market → after-hours):
#   8 UTC (4 AM ET): pre-market
#   14 UTC (10 AM ET): core session
#   20 UTC (4 PM ET): after-hours
# Each job runs ~5.5 hours, loops every 30 seconds.
on:
  schedule:
    - cron: '0 8 * * 1-5'   # 4 AM ET = 8 AM UTC (pre-market)
    - cron: '0 14 * * 1-5'  # 10 AM ET = 2 PM UTC (mid-session)
    - cron: '0 20 * * 1-5'  # 4 PM ET = 8 PM UTC (after-hours)
  workflow_dispatch: {}

env:
  SUPABASE_DB_HOST: aws-1-ca-central-1.pooler.supabase.com
  SUPABASE_DB_PORT: "6543"
  SUPABASE_DB_USER: postgres.seyrycaldytfjvvkqopu
  SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

jobs:
  indices:
    name: Indices + Commodities + FX (30s)
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install psycopg2-binary yfinance
      - name: Fetch indices/commodities/FX every 30s
        run: python scripts/fetch_live_quotes.py --loop --interval 30

  sp500:
    name: S&P 500 Stocks (5s)
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install psycopg2-binary
      - name: Fetch S&P 500 stocks every 5s
        run: python scripts/fetch_sp500_quotes.py --loop --interval 5

  china-commodities:
    name: China Commodity Futures (30s)
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install psycopg2-binary
      - name: Fetch Chinese commodity futures every 30s
        run: |
          # Chinese markets: 9:00-15:00 CST = 1:00-7:00 UTC
          # Run in a loop during those hours
          python -c "
          import time, datetime, subprocess, sys
          start = time.time()
          max_runtime = 5.5 * 3600
          iteration = 0
          while time.time() - start < max_runtime:
              now = datetime.datetime.utcnow()
              # Only fetch during Chinese market hours (1:00-7:00 UTC, roughly)
              if 0 <= now.hour <= 8:
                  try:
                      subprocess.run([sys.executable, 'scripts/fetch_china_quotes.py'], timeout=20)
                      iteration += 1
                      print(f'[{now.strftime(\"%H:%M:%S\")}] #{iteration} done', flush=True)
                  except Exception as e:
                      print(f'Error: {e}', flush=True)
              else:
                  print(f'[{now.strftime(\"%H:%M:%S\")}] Outside China market hours, sleeping', flush=True)
              time.sleep(30)
          print(f'Done: {iteration} iterations')
          "
