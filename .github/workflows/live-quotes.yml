name: Live Market Quotes

# Runs every 15 minutes during US market hours (Mon-Fri, 9:30 AM - 4 PM ET)
# ET = UTC-4 (EDT) or UTC-5 (EST)
# Using UTC-4 (EDT): 9:30 AM ET = 13:30 UTC, 4:00 PM ET = 20:00 UTC
# Cron runs at :00, :15, :30, :45 from 13-20 UTC, Mon-Fri
on:
  schedule:
    - cron: '*/15 13-20 * * 1-5'  # Every 15 min, 1-8 PM UTC, Mon-Fri
  workflow_dispatch: {}

env:
  # Use Supabase Session Pooler (IPv4) instead of direct connection (IPv6-only)
  SUPABASE_DB_HOST: aws-0-us-east-1.pooler.supabase.com
  SUPABASE_DB_PORT: "6543"
  SUPABASE_DB_USER: postgres.seyrycaldytfjvvkqopu
  SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

jobs:
  quotes:
    name: Fetch Live Quotes
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install psycopg2-binary yfinance
      - name: Fetch 46 live/delayed quotes
        run: python scripts/fetch_live_quotes.py
