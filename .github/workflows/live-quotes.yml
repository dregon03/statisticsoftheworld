name: Live Market Quotes

# Runs every 5 minutes during US market hours (Mon-Fri, 9:30 AM - 4 PM ET)
# ET = UTC-4 (EDT): 9:30 AM ET = 13:30 UTC, 4:00 PM ET = 20:00 UTC
# Note: GHA minimum interval is 5 minutes
on:
  schedule:
    - cron: '*/5 13-20 * * 1-5'  # Every 5 min, 1-8 PM UTC, Mon-Fri
  workflow_dispatch: {}

env:
  # Shared Pooler (IPv4-compatible)
  SUPABASE_DB_HOST: aws-1-ca-central-1.pooler.supabase.com
  SUPABASE_DB_PORT: "6543"
  SUPABASE_DB_USER: postgres.seyrycaldytfjvvkqopu
  SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

jobs:
  quotes:
    name: Fetch Live Quotes
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install psycopg2-binary yfinance
      - name: Fetch 46 live/delayed quotes
        run: python scripts/fetch_live_quotes.py
