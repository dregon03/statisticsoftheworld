name: ETL Data Pipeline

# ============================================================
# FULL AUTOMATION SCHEDULE — managed by 1 person, must run unattended
#
#   Every 15 min (market hours) — Live quotes (separate: live-quotes.yml)
#   Every 4 hours               — Polymarket predictions (markets move fast)
#   Daily 7AM UTC               — Yahoo Finance + FRED/ECB + Calendar + Narratives
#   Sunday 8AM UTC              — IMF + World Bank + UN + WHO + History
#   1st of month                — Metadata + Methodology refresh
#   Weekly Monday 6AM UTC       — Sitemap ping to Google/Bing
# ============================================================
on:
  schedule:
    - cron: '0 7 * * *'       # Daily at 7 AM UTC
    - cron: '0 8 * * 0'       # Sundays at 8 AM UTC
    - cron: '0 9 1 * *'       # 1st of month at 9 AM UTC
    - cron: '0 */4 * * *'     # Every 4 hours (Polymarket)
    - cron: '0 6 * * 1'       # Weekly Monday 6 AM UTC (sitemap ping)
  workflow_dispatch:
    inputs:
      pipeline:
        description: 'Which pipeline to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - yfinance
          - financial
          - macro
          - intl_orgs
          - history
          - metadata
          - calendar
          - polymarket
          - narratives
          - sitemap-ping
          - audit

env:
  SUPABASE_DB_HOST: db.seyrycaldytfjvvkqopu.supabase.co
  SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
  FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
  ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}

jobs:
  # ════════════════════════════════════════════════════════════
  # DAILY: Yahoo Finance — stock indices, commodities, FX
  # No API key. ~30s runtime.
  # ════════════════════════════════════════════════════════════
  yfinance:
    name: "Daily: Yahoo Finance"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      github.event.schedule == '0 7 * * *' ||
      github.event.inputs.pipeline == 'all' ||
      github.event.inputs.pipeline == 'yfinance'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install psycopg2-binary yfinance
      - name: Fetch stock indices, commodities, FX (annual history)
        run: python scripts/etl_yfinance.py
      - name: Fetch live/delayed quotes
        run: python scripts/fetch_live_quotes.py

  # ════════════════════════════════════════════════════════════
  # DAILY: Financial APIs — FRED, ECB, ExchangeRate
  # FRED: 120 req/min (free). ECB: unlimited. ExchangeRate: 1500/month.
  # ════════════════════════════════════════════════════════════
  financial:
    name: "Daily: FRED + ECB + FX"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >
      github.event.schedule == '0 7 * * *' ||
      github.event.inputs.pipeline == 'all' ||
      github.event.inputs.pipeline == 'financial'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install psycopg2-binary
      - name: FRED (bonds, rates, US economy)
        run: python scripts/etl_financial.py --source fred
      - name: ECB (exchange rates)
        run: python scripts/etl_financial.py --source ecb
      - name: ExchangeRate-API (FX rates)
        run: python scripts/etl_financial.py --source exchangerate

  # ════════════════════════════════════════════════════════════
  # WEEKLY (Sunday): Macro — IMF, World Bank, UN
  # IMF/WB update quarterly-ish. Weekly catches updates promptly.
  # ════════════════════════════════════════════════════════════
  macro:
    name: "Weekly: IMF + World Bank + UN"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: >
      github.event.schedule == '0 8 * * 0' ||
      github.event.inputs.pipeline == 'all' ||
      github.event.inputs.pipeline == 'macro'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install psycopg2-binary openpyxl
      - name: IMF World Economic Outlook
        run: python scripts/etl.py --source imf --table main
      - name: World Bank WDI
        run: python scripts/etl.py --source wb --table main
      - name: United Nations
        run: python scripts/etl.py --source un --table main
      - name: WHO Global Health Observatory
        run: python scripts/etl_intl_orgs.py --source who
      - name: World Bank extra indicators (labor, agriculture, education, infrastructure)
        run: python scripts/etl_intl_orgs.py --source wb_extra

  # ════════════════════════════════════════════════════════════
  # WEEKLY (Sunday): Historical backfill — 20+ years
  # Keeps sotw_indicators_history current for charts
  # ════════════════════════════════════════════════════════════
  history:
    name: "Weekly: Historical Backfill"
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: >
      github.event.schedule == '0 8 * * 0' ||
      github.event.inputs.pipeline == 'all' ||
      github.event.inputs.pipeline == 'history'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install psycopg2-binary
      - name: IMF historical data
        run: python scripts/etl_history.py --source imf
      - name: World Bank historical data (7 batches)
        run: |
          for batch in 0 1 2 3 4 5 6; do
            echo "══════ WB Batch $batch ══════"
            python scripts/etl_history.py --source wb --batch $batch
            sleep 5
          done

  # ════════════════════════════════════════════════════════════
  # MONTHLY (1st): Metadata refresh
  # Pull indicator descriptions from WB API + update methodology
  # ════════════════════════════════════════════════════════════
  metadata:
    name: "Monthly: Metadata & Methodology"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >
      github.event.schedule == '0 9 1 * *' ||
      github.event.inputs.pipeline == 'all' ||
      github.event.inputs.pipeline == 'metadata'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install psycopg2-binary
      - name: Seed indicator metadata from APIs
        run: python scripts/seed_metadata.py
      - name: Update rich methodology content
        run: python scripts/seed_methodology.py

  # ════════════════════════════════════════════════════════════
  # DAILY: Calendar — warm cache + pre-generate AI summaries
  # Hits the live site to warm FRED + Finnhub calendar cache
  # and generate Mistral summaries for past events
  # ════════════════════════════════════════════════════════════
  calendar:
    name: "Daily: Calendar Warm"
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: >
      github.event.schedule == '0 7 * * *' ||
      github.event.inputs.pipeline == 'all' ||
      github.event.inputs.pipeline == 'calendar'
    steps:
      - name: Warm calendar + summaries
        run: |
          curl -sf "https://statisticsoftheworld.com/api/calendar" -o /dev/null && echo "Calendar cache warmed"
          curl -sf "https://statisticsoftheworld.com/calendar" -o /dev/null && echo "Calendar page hit (triggers summary fetch)"

  # ════════════════════════════════════════════════════════════
  # DAILY: Polymarket — prediction markets
  # Free API, no auth. ~30K active markets, filters to ~1K relevant.
  # ════════════════════════════════════════════════════════════
  polymarket:
    name: "4-Hourly: Polymarket Predictions"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      github.event.schedule == '0 */4 * * *' ||
      github.event.schedule == '0 7 * * *' ||
      github.event.inputs.pipeline == 'all' ||
      github.event.inputs.pipeline == 'polymarket'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install psycopg2-binary
      - name: Fetch & upsert Polymarket markets
        run: python scripts/etl_polymarket.py

  # ════════════════════════════════════════════════════════════
  # DAILY: Refresh AI country narratives
  # 217 narratives, regenerate any older than 30 days.
  # Uses OpenRouter/Mistral Small (~$0.02 total per refresh).
  # ════════════════════════════════════════════════════════════
  narratives:
    name: "Daily: Refresh AI Narratives"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >
      github.event.schedule == '0 7 * * *' ||
      github.event.inputs.pipeline == 'all' ||
      github.event.inputs.pipeline == 'narratives'
    steps:
      - name: Refresh stale narratives via API
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          echo "Warming narrative cache for top countries..."
          for code in USA CHN JPN DEU GBR FRA IND BRA CAN AUS KOR MEX RUS ITA ESP IDN NLD TUR CHE SAU ARG ZAF NGA SGP ISR NOR SWE EGY; do
            curl -sf "https://statisticsoftheworld.com/api/narrative?country=$code" -o /dev/null && echo "  $code ✓" || echo "  $code ✗"
            sleep 1
          done
          echo "Top 28 country narratives refreshed"

  # ════════════════════════════════════════════════════════════
  # DAILY: Pre-warm caches — trending, trade, heatmap
  # Prevents cold-start lag for visitors hitting these pages first
  # ════════════════════════════════════════════════════════════
  cache-warm:
    name: "Daily: Warm Page Caches"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >
      github.event.schedule == '0 7 * * *' ||
      github.event.inputs.pipeline == 'all'
    steps:
      - name: Warm trending, trade, heatmap, forecasts, predictions
        run: |
          for path in /api/trending /api/predictions /api/forecasts /api/heatmap; do
            curl -sf "https://statisticsoftheworld.com$path" -o /dev/null && echo "$path ✓" || echo "$path ✗"
          done
          # Warm top country pages (ISR triggers narrative + all indicators)
          for code in USA CHN JPN GBR CAN; do
            curl -sf "https://statisticsoftheworld.com/country/$code" -o /dev/null && echo "/country/$code ✓"
          done

  # ════════════════════════════════════════════════════════════
  # WEEKLY (Monday): Ping search engines with updated sitemap
  # Ensures Google/Bing discover new pages quickly
  # ════════════════════════════════════════════════════════════
  sitemap-ping:
    name: "Weekly: Sitemap Ping"
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: >
      github.event.schedule == '0 6 * * 1' ||
      github.event.inputs.pipeline == 'all' ||
      github.event.inputs.pipeline == 'sitemap-ping'
    steps:
      - name: Ping Google & Bing
        run: |
          curl -sf "https://www.google.com/ping?sitemap=https://statisticsoftheworld.com/sitemap.xml" -o /dev/null && echo "Google pinged ✓" || echo "Google ping failed"
          curl -sf "https://www.bing.com/ping?sitemap=https://statisticsoftheworld.com/sitemap.xml" -o /dev/null && echo "Bing pinged ✓" || echo "Bing ping failed"

  # ════════════════════════════════════════════════════════════
  # DAILY: Data quality audit (after daily ETL jobs)
  # 41 checks across all data sources
  # ════════════════════════════════════════════════════════════
  audit:
    name: "Audit: Data Quality"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [yfinance, financial, polymarket]
    if: >
      always() && (
        github.event.schedule == '0 7 * * *' ||
        github.event.inputs.pipeline == 'all' ||
        github.event.inputs.pipeline == 'audit'
      )
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install psycopg2-binary
      - name: Run 41-check data audit
        run: python scripts/audit_data.py
      - name: Verify critical pages respond
        if: always()
        run: |
          FAILED=0
          for path in / /predictions /commodities /indicators /calendar /api/v1/countries; do
            CODE=$(curl -sf -o /dev/null -w "%{http_code}" "https://statisticsoftheworld.com$path" 2>/dev/null)
            if [ "$CODE" != "200" ]; then
              echo "❌ $path returned $CODE"
              FAILED=1
            else
              echo "✓ $path OK"
            fi
          done
          if [ "$FAILED" = "1" ]; then
            echo "::warning::Some critical pages are not responding with 200"
          fi
