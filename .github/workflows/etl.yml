name: ETL Data Pipeline

# ============================================================
# FULL AUTOMATION — managed by 1 person, runs 100% unattended
#
#   Every 15 min (market hours) — Live quotes (separate: live-quotes.yml)
#   Every 4 hours               — Polymarket predictions
#   Daily midnight UTC          — API key reset
#   Daily 7AM UTC               — All daily jobs (YF, FRED, etc.)
#   1st of month 9AM UTC        — Intl org data (IMF, WB, UN, WHO, COMTRADE, history)
#   Weekly Monday 6AM UTC       — Sitemap ping + DB health check
# ============================================================
on:
  schedule:
    - cron: '0 0 * * *'       # Daily midnight UTC (API key reset)
    - cron: '0 7 * * *'       # Daily at 7 AM UTC
    - cron: '0 9 1 * *'       # 1st of month at 9 AM UTC (intl org annual data)
    - cron: '0 */4 * * *'     # Every 4 hours (Polymarket)
    - cron: '0 6 * * 1'       # Weekly Monday 6 AM UTC
  workflow_dispatch:
    inputs:
      pipeline:
        description: 'Which pipeline to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - yfinance
          - financial
          - macro
          - intl_orgs
          - macro-imf
          - macro-wb
          - macro-un
          - macro-who
          - history
          - metadata
          - calendar
          - polymarket
          - narratives
          - trade
          - api-keys
          - monitor
          - newsletter
          - sitemap-ping
          - audit
          - clean-trade
      trade_batch:
        description: 'Trade batch number (0-6, empty=auto)'
        required: false
        default: ''
        type: string

env:
  # Shared Pooler (IPv4-compatible)
  SUPABASE_DB_HOST: aws-1-ca-central-1.pooler.supabase.com
  SUPABASE_DB_PORT: "6543"
  SUPABASE_DB_USER: postgres.seyrycaldytfjvvkqopu
  SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
  FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
  ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
  COMTRADE_API_KEY: ${{ secrets.COMTRADE_API_KEY }}

jobs:
  # ════════════════════════════════════════════════════════════
  # DAILY MIDNIGHT: Reset API key daily counters
  # ════════════════════════════════════════════════════════════
  api-keys:
    name: "Midnight: Reset API Key Counters"
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: >
      github.event.schedule == '0 0 * * *' ||
      github.event.inputs.pipeline == 'all' ||
      github.event.inputs.pipeline == 'api-keys'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install psycopg2-binary
      - name: Reset daily request counters
        run: python scripts/reset_api_keys.py

  # ════════════════════════════════════════════════════════════
  # DAILY: Yahoo Finance — stock indices, commodities, FX
  # No API key. ~30s runtime.
  # ════════════════════════════════════════════════════════════
  yfinance:
    name: "Daily: Yahoo Finance"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      github.event.schedule == '0 7 * * *' ||
      github.event.inputs.pipeline == 'all' ||
      github.event.inputs.pipeline == 'yfinance'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install psycopg2-binary yfinance
      - name: Fetch stock indices, commodities, FX (annual history)
        run: python scripts/etl_yfinance.py
      - name: Fetch live/delayed quotes
        run: python scripts/fetch_live_quotes.py

  # ════════════════════════════════════════════════════════════
  # DAILY: Financial APIs — FRED, ECB, ExchangeRate
  # FRED: 120 req/min (free). ECB: unlimited. ExchangeRate: 1500/month.
  # ════════════════════════════════════════════════════════════
  financial:
    name: "Daily: FRED + ECB + FX"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >
      github.event.schedule == '0 7 * * *' ||
      github.event.inputs.pipeline == 'all' ||
      github.event.inputs.pipeline == 'financial'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install psycopg2-binary
      - name: FRED (bonds, rates, US economy)
        run: python scripts/etl_financial.py --source fred
      - name: ECB (exchange rates)
        run: python scripts/etl_financial.py --source ecb
      - name: ExchangeRate-API (FX rates)
        run: python scripts/etl_financial.py --source exchangerate

  # ════════════════════════════════════════════════════════════
  # MONTHLY (1st): IMF World Economic Outlook
  # Annual data — no need to fetch weekly
  # ════════════════════════════════════════════════════════════
  macro-imf:
    name: "Monthly: IMF WEO"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >
      github.event.schedule == '0 9 1 * *' ||
      github.event.inputs.pipeline == 'all' ||
      github.event.inputs.pipeline == 'macro' ||
      github.event.inputs.pipeline == 'intl_orgs' ||
      github.event.inputs.pipeline == 'macro-imf'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install psycopg2-binary openpyxl
      - name: IMF World Economic Outlook
        run: python scripts/etl.py --source imf --table main

  # ════════════════════════════════════════════════════════════
  # MONTHLY (1st): World Bank WDI (all 312 indicators)
  # Uses batch upserts (execute_values) — 156 SQL statements instead of 62,000
  # Annual data — no need to fetch weekly
  # ════════════════════════════════════════════════════════════
  macro-wb:
    name: "Monthly: World Bank WDI"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >
      github.event.schedule == '0 9 1 * *' ||
      github.event.inputs.pipeline == 'all' ||
      github.event.inputs.pipeline == 'macro' ||
      github.event.inputs.pipeline == 'intl_orgs' ||
      github.event.inputs.pipeline == 'macro-wb'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install psycopg2-binary
      - name: World Bank WDI (312 indicators, batch upsert)
        run: python scripts/etl.py --source wb --table main

  # ════════════════════════════════════════════════════════════
  # MONTHLY (1st): United Nations
  # Annual data — no need to fetch weekly
  # ════════════════════════════════════════════════════════════
  macro-un:
    name: "Monthly: United Nations"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >
      github.event.schedule == '0 9 1 * *' ||
      github.event.inputs.pipeline == 'all' ||
      github.event.inputs.pipeline == 'macro' ||
      github.event.inputs.pipeline == 'intl_orgs' ||
      github.event.inputs.pipeline == 'macro-un'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install psycopg2-binary
      - name: United Nations
        run: python scripts/etl.py --source un --table main

  # ════════════════════════════════════════════════════════════
  # MONTHLY (1st): WHO Global Health Observatory
  # Annual data — no need to fetch weekly
  # ════════════════════════════════════════════════════════════
  macro-who:
    name: "Monthly: WHO GHO"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >
      github.event.schedule == '0 9 1 * *' ||
      github.event.inputs.pipeline == 'all' ||
      github.event.inputs.pipeline == 'macro' ||
      github.event.inputs.pipeline == 'intl_orgs' ||
      github.event.inputs.pipeline == 'macro-who'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install psycopg2-binary
      - name: WHO Global Health Observatory
        run: python scripts/etl_intl_orgs.py --source who
      - name: World Bank extra indicators
        run: python scripts/etl_intl_orgs.py --source wb_extra

  # ════════════════════════════════════════════════════════════
  # MONTHLY (1st): Historical backfill — 20+ years
  # Annual data — no need to fetch weekly
  # ════════════════════════════════════════════════════════════
  history:
    name: "Monthly: Historical Backfill"
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: >
      github.event.schedule == '0 9 1 * *' ||
      github.event.inputs.pipeline == 'all' ||
      github.event.inputs.pipeline == 'history'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install psycopg2-binary
      - name: IMF historical data
        run: python scripts/etl_history.py --source imf
      - name: World Bank historical data (7 batches)
        run: |
          for batch in 0 1 2 3 4 5 6; do
            echo "══════ WB Batch $batch ══════"
            python scripts/etl_history.py --source wb --batch $batch
            sleep 5
          done

  # ════════════════════════════════════════════════════════════
  # QUARTERLY: UN COMTRADE v2 trade data → Supabase
  # Runs daily for 7 days each quarter (1st-7th of Jan/Apr/Jul/Oct).
  # Rotates through 170+ countries in 7 daily batches (~24/day).
  # ════════════════════════════════════════════════════════════
  trade:
    name: "Quarterly: COMTRADE Trade Data"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >
      github.event.schedule == '0 7 * * *' ||
      github.event.inputs.pipeline == 'all' ||
      github.event.inputs.pipeline == 'trade'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install psycopg2-binary
      - name: Check if trade should run (1st-7th of quarter months)
        id: check
        run: |
          DAY=$(date -u +%d)
          MONTH=$(date -u +%m)
          # Run on 1st-7th of Jan(01), Apr(04), Jul(07), Oct(10) — or if manually triggered
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || ([ "$DAY" -le 7 ] && ([ "$MONTH" = "01" ] || [ "$MONTH" = "04" ] || [ "$MONTH" = "07" ] || [ "$MONTH" = "10" ])); then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "Skipping trade ETL (only runs 1st-7th of quarter months)"
          fi
      - name: Fetch trade data (rotating batch)
        if: steps.check.outputs.should_run == 'true'
        run: python scripts/etl_trade.py --batch ${{ github.event.inputs.trade_batch || -1 }} --total-batches 7

  # ════════════════════════════════════════════════════════════
  # MONTHLY (1st): Metadata + full narrative refresh
  # ════════════════════════════════════════════════════════════
  metadata:
    name: "Monthly: Metadata & Methodology"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >
      github.event.schedule == '0 9 1 * *' ||
      github.event.inputs.pipeline == 'all' ||
      github.event.inputs.pipeline == 'metadata'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install psycopg2-binary
      - name: Ensure subscribers table exists
        run: python scripts/setup_subscribers.py || echo "⚠ Subscribers table setup skipped (connection issue)"
      - name: Seed indicator metadata from APIs
        run: python scripts/seed_metadata.py
      - name: Update rich methodology content
        run: python scripts/seed_methodology.py

  # ════════════════════════════════════════════════════════════
  # DAILY: Calendar (Gemini 2.5 Pro with Google Search grounding)
  # One AI call → full global macro + earnings calendar
  # 44+ events across 7 countries, verified via Google Search
  # Cost: ~$0.01/day
  # ════════════════════════════════════════════════════════════
  calendar:
    name: "Daily: Calendar (Gemini 2.5 Pro)"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >
      github.event.schedule == '0 7 * * *' ||
      github.event.inputs.pipeline == 'all' ||
      github.event.inputs.pipeline == 'calendar'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install psycopg2-binary
      - name: Fetch calendar via Gemini 2.5 Pro
        run: python scripts/etl_calendar_ai.py
      - name: Warm calendar page cache
        run: |
          curl -sf "https://statisticsoftheworld.com/api/calendar" -o /dev/null && echo "Calendar API warmed ✓" || true

  # ════════════════════════════════════════════════════════════
  # EVERY 4 HOURS: Polymarket prediction markets
  # ════════════════════════════════════════════════════════════
  polymarket:
    name: "4-Hourly: Polymarket Predictions"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      github.event.schedule == '0 */4 * * *' ||
      github.event.schedule == '0 7 * * *' ||
      github.event.inputs.pipeline == 'all' ||
      github.event.inputs.pipeline == 'polymarket'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install psycopg2-binary
      - name: Fetch & upsert Polymarket markets
        run: python scripts/etl_polymarket.py

  # ════════════════════════════════════════════════════════════
  # DAILY: Refresh AI country narratives (all 217)
  # Hits the narrative API which regenerates if >30 days old.
  # Batched to avoid overwhelming OpenRouter. ~5 min runtime.
  # ════════════════════════════════════════════════════════════
  narratives:
    name: "Daily: Refresh AI Narratives"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >
      github.event.schedule == '0 7 * * *' ||
      github.event.inputs.pipeline == 'all' ||
      github.event.inputs.pipeline == 'narratives'
    steps:
      - name: Refresh all 217 country narratives
        run: |
          echo "Refreshing narratives (API auto-regenerates if >30 days old)..."
          CODES="USA CHN JPN DEU GBR FRA IND BRA CAN AUS KOR MEX RUS ITA ESP
                 IDN NLD TUR CHE SAU ARG ZAF NGA SGP ISR NOR SWE EGY POL BEL
                 AUT IRL DNK FIN PRT GRC CZE ROU HUN NZL CHL COL PER VEN
                 ARE QAT KWT BHR OMN JOR LBN IRQ IRN PAK BGD LKA MMR THA
                 VNM PHL MYS KHM LAO MNG KAZ UZB GEO ARM AZE UKR BLR MDA
                 SRB HRV SVN SVK BGR LTU LVA EST ALB MKD BIH MNE XKX
                 MAR TUN DZA LBY EGY SDN ETH KEN TZA UGA RWA MOZ ZWE BWA
                 NAM MUS MDG SEN CIV GHA CMR COD AGO ZMB MLI BFA NER TCD
                 ECU BOL PRY URY CRI PAN DOM GTM HND SLV NIC CUB JAM HTI
                 TTO BRB BHS GUY SUR BLZ FJI PNG WSM TON VUT SLB KIR"

          SUCCESS=0
          FAIL=0
          for code in $CODES; do
            if curl -sf "https://statisticsoftheworld.com/api/narrative?id=$code" -o /dev/null 2>/dev/null; then
              SUCCESS=$((SUCCESS + 1))
            else
              FAIL=$((FAIL + 1))
            fi
            sleep 0.5
          done
          echo "✓ Refreshed $SUCCESS narratives ($FAIL skipped/failed)"

  # ════════════════════════════════════════════════════════════
  # DAILY: Pre-warm caches — eliminates cold-start lag
  # ════════════════════════════════════════════════════════════
  cache-warm:
    name: "Daily: Warm Page Caches"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [yfinance, financial, polymarket]
    if: >
      always() && (
        github.event.schedule == '0 7 * * *' ||
        github.event.inputs.pipeline == 'all'
      )
    steps:
      - name: Warm API caches
        run: |
          for path in /api/trending /api/predictions /api/forecasts /api/heatmap /api/quotes; do
            curl -sf "https://statisticsoftheworld.com$path" -o /dev/null && echo "$path ✓" || echo "$path ✗"
          done
      - name: Warm top country pages
        run: |
          for code in USA CHN JPN GBR CAN DEU FRA IND BRA AUS; do
            curl -sf "https://statisticsoftheworld.com/country/$code" -o /dev/null && echo "/country/$code ✓"
          done
      - name: Warm futures curves for top commodities
        run: |
          for commodity in crude-oil gold natural-gas silver copper wheat corn; do
            curl -sf "https://statisticsoftheworld.com/api/futures-curve?commodity=$commodity" -o /dev/null && echo "futures/$commodity ✓" || echo "futures/$commodity ✗"
          done

  # ════════════════════════════════════════════════════════════
  # DAILY: Newsletter digest to subscribers
  # Sends via Gmail SMTP (statisticsoftheworldcontact@gmail.com)
  # ════════════════════════════════════════════════════════════
  newsletter:
    name: "Daily: Send Newsletter Digest"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      github.event.schedule == '0 7 * * *' ||
      github.event.inputs.pipeline == 'all' ||
      github.event.inputs.pipeline == 'newsletter'
    steps:
      - name: Send weekly digest to subscribers
        run: |
          RESPONSE=$(curl -sf -X POST "https://statisticsoftheworld.com/api/newsletter?token=${{ secrets.NEWSLETTER_SECRET }}" \
            -H "Content-Type: application/json" 2>/dev/null)
          echo "Newsletter response: $RESPONSE"
          SENT=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('sent',0))" 2>/dev/null || echo "0")
          echo "Sent to $SENT subscribers"

  # ════════════════════════════════════════════════════════════
  # WEEKLY (Monday): Sitemap ping + DB health check
  # ════════════════════════════════════════════════════════════
  sitemap-ping:
    name: "Weekly: Sitemap Ping"
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: >
      github.event.schedule == '0 6 * * 1' ||
      github.event.inputs.pipeline == 'all' ||
      github.event.inputs.pipeline == 'sitemap-ping'
    steps:
      - name: Ping Google & Bing
        run: |
          curl -sf "https://www.google.com/ping?sitemap=https://statisticsoftheworld.com/sitemap.xml" -o /dev/null && echo "Google pinged ✓" || echo "Google ping ✗"
          curl -sf "https://www.bing.com/ping?sitemap=https://statisticsoftheworld.com/sitemap.xml" -o /dev/null && echo "Bing pinged ✓" || echo "Bing ping ✗"

  monitor:
    name: "Weekly: DB Health Check"
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: >
      github.event.schedule == '0 6 * * 1' ||
      github.event.inputs.pipeline == 'all' ||
      github.event.inputs.pipeline == 'monitor'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install psycopg2-binary
      - name: Check DB size, table health, stale data
        run: python scripts/monitor_supabase.py

  # ════════════════════════════════════════════════════════════
  # DAILY: Data quality audit + page health checks
  # Runs after all daily ETL jobs complete
  # ════════════════════════════════════════════════════════════
  audit:
    name: "Audit: Data Quality + Pages"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [yfinance, financial, polymarket, cache-warm]
    if: >
      always() && (
        github.event.schedule == '0 7 * * *' ||
        github.event.inputs.pipeline == 'all' ||
        github.event.inputs.pipeline == 'audit'
      )
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install psycopg2-binary
      - name: Run data quality checks
        run: python scripts/audit_data.py
      - name: Verify critical pages respond
        if: always()
        run: |
          FAILED=0
          for path in / /predictions /commodities /indicators /calendar /countries /compare /map /markets /forecasts /ai /api/v1/countries /api/predictions /api/openapi.json /llms.txt; do
            CODE=$(curl -sf -o /dev/null -w "%{http_code}" "https://statisticsoftheworld.com$path" 2>/dev/null)
            if [ "$CODE" != "200" ]; then
              echo "❌ $path returned $CODE"
              FAILED=$((FAILED + 1))
            else
              echo "✓ $path"
            fi
          done
          if [ "$FAILED" -gt "0" ]; then
            echo "::error::$FAILED critical pages are not responding!"
            exit 1
          fi
          echo "All 15 critical pages OK ✓"

  # ════════════════════════════════════════════════════════════
  # ════════════════════════════════════════════════════════════
  # ONE-TIME: Clean dirty trade cache (deduplicate partner lists)
  # ════════════════════════════════════════════════════════════
  clean-trade:
    name: "Util: Clean Trade Cache"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.inputs.pipeline == 'clean-trade'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install psycopg2-binary
      - name: Deduplicate trade cache
        run: python scripts/clean_trade_cache.py

  notify-failure:
    name: "Alert: ETL Failure"
    runs-on: ubuntu-latest
    timeout-minutes: 1
    needs: [yfinance, financial, macro-imf, macro-wb, macro-un, macro-who, history, polymarket, audit]
    if: >
      always() &&
      (needs.yfinance.result == 'failure' ||
       needs.financial.result == 'failure' ||
       needs.macro-imf.result == 'failure' ||
       needs.macro-wb.result == 'failure' ||
       needs.macro-un.result == 'failure' ||
       needs.macro-who.result == 'failure' ||
       needs.history.result == 'failure' ||
       needs.polymarket.result == 'failure' ||
       needs.audit.result == 'failure')
    steps:
      - name: Report failure
        run: |
          echo "::error::ETL pipeline failure detected!"
          echo ""
          echo "Failed jobs:"
          echo "  yfinance:   ${{ needs.yfinance.result }}"
          echo "  financial:  ${{ needs.financial.result }}"
          echo "  macro-imf:  ${{ needs.macro-imf.result }}"
          echo "  macro-wb:   ${{ needs.macro-wb.result }}"
          echo "  macro-un:   ${{ needs.macro-un.result }}"
          echo "  macro-who:  ${{ needs.macro-who.result }}"
          echo "  history:    ${{ needs.history.result }}"
          echo "  polymarket: ${{ needs.polymarket.result }}"
          echo "  audit:      ${{ needs.audit.result }}"
          echo ""
          echo "Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          exit 1
