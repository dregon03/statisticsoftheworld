# SOTW ETL log rotation config
# Install: sudo cp /opt/sotw-etl/scripts/logrotate-sotw.conf /etc/logrotate.d/sotw-etl
/var/log/sotw-etl.log
/var/log/sotw-twitter.log
/var/log/sotw-bluesky.log
/var/log/sotw-quotes.log
/var/log/sotw-finnhub.log
/var/log/sotw-binance.log
/var/log/sotw-monitor.log
{
    weekly
    rotate 4
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}
